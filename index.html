function show(id,html,copyText=''){
    const res = document.getElementById('res'+id);
    res.innerHTML = html + (copyText?`<br><button class="copy-btn" onclick="navigator.clipboard.writeText('${copyText}');this.innerText='Copied!'">Copy</button>`:'');
    res.classList.add('show');
}

function textTool(id,type){
    let val = document.getElementById('txt'+id)?.value || prompt('Text daalo:');
    if(!val) return;
    let res = '';
    if(type=='upper') res=val.toUpperCase();
    if(type=='lower') res=val.toLowerCase();
    if(type=='count') res=`Words: ${val.split(/\s+/).filter(Boolean).length} | Chars: ${val.length}`;
    if(type=='reverse') res=val.split('').reverse().join('');
    if(type=='b64e') res=btoa(val);
    if(type=='b64d') try{res=atob(val)}catch{res='Invalid Base64'};
    if(type=='copy'){navigator.clipboard.writeText(val);res='Copied!'};
    show(id,`<textarea rows="3">${res}</textarea>`,res);
}

function startTimer(id,sec){show(id,`<h3 id="tm${id}">${sec}</h3>`);let i=setInterval(()=>{sec--;document.getElementById('tm'+id).innerText=sec;if(sec<=0){clearInterval(i);alert('Time Up!')}},1000)}
function ageCalc(id){let d=prompt('DOB: DD-MM-YYYY');if(d){let[dd,mm,yy]=d.split('-').map(Number);let age=new Date().getFullYear()-yy;show(id,`Age: ${age} years`)}}
function daysCalc(id){let d1=prompt('Date 1: DD-MM-YYYY');let d2=prompt('Date 2: DD-MM-YYYY');if(d1&&d2){let[dd1,mm1,yy1]=d1.split('-').map(Number);let[dd2,mm2,yy2]=d2.split('-').map(Number);let diff=Math.abs(new Date(yy2,mm2-1,dd2)-new Date(yy1,mm1-1,dd1));show(id,`Days: ${Math.ceil(diff/(1000*60*60*24))}`)}}
function convert(id,t){let v=prompt('Value daalo:');if(!v)return;v=parseFloat(v);let r='';if(t=='inr')r=`$${(v/83).toFixed(2)} USD`;if(t=='usd')r=`₹${(v*83).toFixed(2)} INR`;if(t=='c2f')r=`${(v*9/5+32).toFixed(2)}°F`;if(t=='f2c')r=`${((v-32)*5/9).toFixed(2)}°C`;if(t=='cm')r=`${(v/2.54).toFixed(2)} inch`;if(t=='kg')r=`${(v*2.204).toFixed(2)} lbs`;if(t=='mb')r=`${(v/1024).toFixed(2)} GB`;show(id,r)}
function qrGen(id){let t=prompt('Text/Link:');if(t)show(id,`<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(t)}" width="100%">`)}
function loveCalc(id){let n1=prompt('Pehla Naam:');let n2=prompt('Dusra Naam:');if(n1&&n2)show(id,`${n1} ❤️ ${n2} = <b>${Math.floor(Math.random()*50)+50}%</b>`)}
function contactWA(id){let m=prompt('Message:');if(m){window.open(`https://wa.me/?text=${encodeURIComponent(m+' - via OXIE Tools')}`);show(id,'WhatsApp Open')}}
function tagGen(id){let t=prompt('Topic:');if(t)show(id,`<textarea rows="4">${t}, ${t} video, ${t} tutorial, techoxiee, oxie tools, ${t} kaise kare, ${t} tips</textarea>`)}
function thumbDL(id){let u=prompt('YT URL:');if(u){let vid=u.split('v=')[1]?.split('&')[0]||u.split('youtu.be/')[1]?.split('?')[0];if(vid)show(id,`<img src="https://img.youtube.com/vi/${vid}/maxresdefault.jpg" width="100%"><br><a href="https://img.youtube.com/vi/${vid}/maxresdefault.jpg" download>Download</a>`)}}
function titleGen(id){let t=prompt('Topic:');if(t)show(id,`1. ${t} - Full Guide 2026<br>2. ${t} Kaise Kare?<br>3. ${t} | 5 Min Me`)}
function descGen(id){let t=prompt('Topic:');if(t)show(id,`<textarea rows="5">🔥 ${t} ki video\n\n✅ Seekho:\n- ${t} kya hai\n- ${t} kaise use kare\n\n📌 OXIE Tools: [link]\n#techoxiee</textarea>`)}
function findReplace(id){let t=prompt('Text:');let f=prompt('Kya dhundna:');let r=prompt('Replace:');if(t&&f)show(id,t.replaceAll(f,r))}
function urlShort(id){let u=prompt('URL:');if(u){window.open(`https://tinyurl.com/create.php?url=${encodeURIComponent(u)}`);show(id,'Short URL Open')}}
async function hashText(id){let v=prompt('Text:');if(!v)return;let e=new TextEncoder().encode(v);let h=await crypto.subtle.digest('SHA-256',e);show(id,'SHA-256: '+Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join(''))}
</script>
